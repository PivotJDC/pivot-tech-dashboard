# Netlify deployment config for the Next.js 14 App Router dashboard.
# The Next.js runtime plugin handles the App Router build output, SSR/edge
# functions, and routing — no manual `publish` dir needed.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Public (non-secret) base URL the browser calls. Set here so a deploy always
  # has it; override per-context in the Netlify UI if you point at staging/prod.
  NEXT_PUBLIC_API_URL = "https://bwgwcrstym.us-east-1.awsapprunner.com"
  # Admin (/admin) MVP gate password — PLACEHOLDER so the var exists at build
  # time and Next can inline it. NOT secret (NEXT_PUBLIC_* ships in the client
  # bundle). NOTE: netlify.toml build env takes precedence over Netlify-UI vars
  # of the same name, so set the REAL admin token by editing THIS value (it must
  # be an admin JWT the middleware accepts), not in the UI.
  NEXT_PUBLIC_ADMIN_TOKEN = "changeme-placeholder"

[[plugins]]
  package = "@netlify/plugin-nextjs"
